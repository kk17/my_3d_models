fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check YAML files
      - id: end-of-file-fixer
        name: Add newline at end-of-file if required
      - id: trailing-whitespace
        name: Remove trailing whitespace if any
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        name: Sort imports
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.10
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]
  - repo: https://github.com/pycqa/pylint
    rev: v4.0.4
    hooks:
      - id: pylint
        name: Linting
        stages: [pre-push]
        args: ["delib"]
  - repo: local
    hooks:
      - id: unit tests
        name: Unit Tests
        stages: [manual]
        entry: uv run pytest
        language: system
        verbose: true
        always_run: true
        pass_filenames: false
